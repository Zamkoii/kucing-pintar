<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mancing Hidrolisis - Kucing Pintar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Fredoka', sans-serif;
            background: #E0F7FA;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .stat-box {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 6px 0 #81D4FA;
            font-weight: bold;
            font-size: 1.2rem;
            color: #0277BD;
            border: 3px solid #81D4FA;
        }

        #quiz-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .quiz-card {
            background: white;
            padding: 2.5rem;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 6px solid #4FC3F7;
            box-shadow: 0 15px 0 #29B6F6;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        .choice-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.3rem;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }

        .btn-iya { background: #66BB6A; border-bottom: 6px solid #388E3C; }
        .btn-tidak { background: #EF5350; border-bottom: 6px solid #C62828; }
        .choice-btn:active { transform: translateY(4px); border-bottom-width: 2px; }

        #explanation-panel {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #F1F8E9;
            border-radius: 20px;
            color: #33691E;
            font-size: 0.95rem;
            border: 2px dashed #AED581;
        }

        #time-deduction {
            position: absolute;
            color: #D32F2F;
            font-weight: bold;
            font-size: 2.5rem;
            display: none;
            pointer-events: none;
            z-index: 60;
            text-shadow: 2px 2px white;
            animation: fadeUp 1s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-panel">
        <div class="stat-box">🐟 Skor: <span id="score">0</span></div>
        <div class="stat-box" id="timer-box">⏱️ <span id="timer">60</span>s</div>
    </div>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <div id="quiz-fish" class="text-6xl mb-4">🐠</div>
            <h3 id="question-text" class="text-2xl font-bold text-blue-600 mb-6">Pertanyaan?</h3>
            
            <div id="explanation-panel"></div>

            <div class="btn-container" id="quiz-actions">
                <button class="choice-btn btn-iya" onclick="processAnswer(true)">IYA</button>
                <button class="choice-btn btn-tidak" onclick="processAnswer(false)">TIDAK</button>
            </div>
            
            <button id="next-btn" style="display:none" class="mt-6 bg-blue-500 text-white px-10 py-3 rounded-full font-bold shadow-lg" onclick="closeQuiz()">Lanjut Mancing! 🎣</button>
        </div>
    </div>

    <div id="time-deduction">-5s</div>

    <div id="game-over" style="display:none; position:absolute; inset:0; background:rgba(3, 169, 244, 0.95); z-index:200; flex-direction:column; align-items:center; justify-content:center; text-align: center; color: white; padding: 20px;">
        <h1 class="text-5xl font-black mb-2" id="final-title">Waktu Habis! 🐱</h1>
        <p class="text-2xl font-bold mb-8" id="final-score">Skor Kamu: 0</p>
        <button onclick="location.reload()" class="bg-white text-blue-500 px-12 py-5 rounded-full font-black text-2xl shadow-2xl hover:scale-105 transition">Main Lagi 🐠</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0;
    let timeLeft = 60;
    let isRunning = true;
    let isPaused = false;
    let boatX = window.innerWidth / 2;
    let hook = { y: 190, state: 'idle', speed: 14 };
    let fishes = [];
    
    // Bank Pertanyaan
    let availableQuestions = [
        { q: "Apakah NaCl bisa terhidrolisis dalam air?", a: false, why: "NaCl berasal dari asam kuat & basa kuat, sehingga ion-ionnya tidak bereaksi dengan air." },
        { q: "Apakah NH₄Cl punya sifat asam?", a: true, why: "Betul! Kation amonium (NH₄⁺) dari basa lemah menghasilkan ion H⁺ saat bereaksi dengan air." },
        { q: "Apakah CH₃COONa bersifat basa?", a: true, why: "Benar! Anion asetat dari asam lemah menghasilkan ion OH⁻ dalam air." },
        { q: "Apakah K₂SO₄ mengalami hidrolisis?", a: false, why: "Tidak, karena keduanya berasal dari komponen kuat (KOH dan H₂SO₄)." },
        { q: "Apakah AlCl₃ bikin pH air jadi asam?", a: true, why: "Iya! Kation Al³⁺ mengalami hidrolisis kation dan menghasilkan ion H⁺." },
        { q: "Apakah Na₂CO₃ bersifat asam?", a: false, why: "Salah, Na₂CO₃ bersifat basa karena mengandung anion dari asam lemah (H₂CO₃)." },
        { q: "Apakah CH₃COONH₄ hidrolisis total?", a: true, why: "Tepat! Karena asam dan basanya sama-sama lemah, semua bagian garam terhidrolisis." },
        { q: "Apakah garam yang tidak terhidrolisis punya pH = 7?", a: true, why: "Betul sekali! Jika tidak terhidrolisis, pH air tetap netral yaitu 7." },
        { q: "Apakah hidrolisis terjadi pada garam asam kuat & basa kuat?", a: false, why: "Tidak terjadi. Garam dari komponen kuat tidak bereaksi dengan air." },
        { q: "Apakah anion dari asam lemah mengalami hidrolisis?", a: true, why: "Iya! Anion tersebut akan menarik H⁺ dari air dan melepaskan OH⁻." }
    ];

    let currentQuestion = null;
    let currentFishEmoji = "🐠";

    function init() {
        resize();
        for(let i=0; i<6; i++) spawnFish();
        
        setInterval(() => {
            if(isRunning && !isPaused) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame("Waktu Habis!");
            }
        }, 1000);

        requestAnimationFrame(loop);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => boatX = e.clientX);
    window.addEventListener('touchmove', (e) => boatX = e.touches[0].clientX);
    window.addEventListener('mousedown', () => {
        if(hook.state === 'idle' && !isPaused && isRunning) hook.state = 'dropping';
    });

    function spawnFish() {
        fishes.push({
            x: Math.random() * canvas.width,
            y: 350 + Math.random() * (canvas.height - 450),
            speed: 1.5 + Math.random() * 2,
            dir: Math.random() > 0.5 ? 1 : -1,
            emoji: ["🐠", "🐟", "🐡", "🐙", "🐬", "🦑"][Math.floor(Math.random()*6)],
            size: 55
        });
    }

    function drawCat(x, y) {
        ctx.save();
        ctx.translate(x, y);
        
        // Perahu kayu
        ctx.fillStyle = '#8D6E63';
        ctx.beginPath();
        ctx.roundRect(-60, 0, 120, 30, [0, 0, 20, 20]);
        ctx.fill();

        // Kucing lucu
        const bob = Math.sin(Date.now() * 0.005) * 4;
        ctx.translate(-15, bob - 25);
        
        // Kepala Putih
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(0, -10, 18, 0, Math.PI*2); ctx.fill();
        // Telinga Pink
        ctx.fillStyle = '#FFCDD2';
        ctx.beginPath(); ctx.moveTo(-15, -15); ctx.lineTo(-22, -30); ctx.lineTo(-5, -20); ctx.fill();
        ctx.beginPath(); ctx.moveTo(15, -15); ctx.lineTo(22, -30); ctx.lineTo(5, -20); ctx.fill();
        // Mata & Pipi
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(-6, -12, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -12, 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#F8BBD0';
        ctx.beginPath(); ctx.arc(-10, -6, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(10, -6, 4, 0, Math.PI*2); ctx.fill();
        
        // Joran Cokelat
        ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(15, -5); ctx.lineTo(55, -45); ctx.stroke();
        
        ctx.restore();
    }

    function loop() {
        if(!isRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Langit & Laut
        ctx.fillStyle = '#E0F7FA'; ctx.fillRect(0, 0, canvas.width, 240);
        ctx.fillStyle = '#03A9F4'; ctx.fillRect(0, 240, canvas.width, canvas.height);

        const boatY = 240 + Math.sin(Date.now() * 0.003) * 5;
        drawCat(boatX, boatY);

        // Tali Pancing
        if(hook.state === 'dropping') {
            hook.y += hook.speed;
            if(hook.y > canvas.height - 80) hook.state = 'pulling';
        } else if(hook.state === 'pulling') {
            hook.y -= hook.speed;
            if(hook.y <= 200) { hook.y = 200; hook.state = 'idle'; }
        }

        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(boatX + 40, boatY - 45); ctx.lineTo(boatX + 40, hook.y); ctx.stroke();
        ctx.font = '30px Arial'; ctx.fillText('⚓', boatX + 26, hook.y + 20);

        // Gambar Ikan
        fishes.forEach((f, i) => {
            if(!isPaused) f.x += f.speed * f.dir;
            if(f.x < -80 || f.x > canvas.width + 80) f.dir *= -1;
            
            ctx.save();
            ctx.translate(f.x, f.y);
            if(f.dir === 1) ctx.scale(-1, 1);
            ctx.font = f.size + 'px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(f.emoji, 0, 0);
            ctx.restore();

            const dist = Math.hypot((boatX + 40) - f.x, hook.y - f.y);
            if(dist < 40 && hook.state === 'dropping' && !isPaused) {
                triggerQuiz(f, i);
            }
        });

        requestAnimationFrame(loop);
    }

    function triggerQuiz(fish, index) {
        if (availableQuestions.length === 0) {
            endGame("Semua Soal Terjawab!");
            return;
        }

        isPaused = true;
        hook.state = 'pulling';
        currentFishEmoji = fish.emoji;
        fishes.splice(index, 1);
        
        // Pilih pertanyaan secara acak dan hapus dari list agar tidak muncul lagi
        const qIdx = Math.floor(Math.random() * availableQuestions.length);
        currentQuestion = availableQuestions[qIdx];
        availableQuestions.splice(qIdx, 1); 
        
        document.getElementById('quiz-fish').innerText = currentFishEmoji;
        document.getElementById('question-text').innerText = currentQuestion.q;
        document.getElementById('explanation-panel').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('quiz-actions').style.display = 'flex';
        document.getElementById('quiz-overlay').style.display = 'flex';
    }

    function processAnswer(userAns) {
        const isCorrect = (userAns === currentQuestion.a);
        const expPanel = document.getElementById('explanation-panel');
        const actions = document.getElementById('quiz-actions');
        const nextBtn = document.getElementById('next-btn');

        if(isCorrect) {
            score += 10;
            document.getElementById('score').innerText = score;
            expPanel.innerHTML = "<b>Jawaban Benar! 🌟</b><br>" + currentQuestion.why;
            expPanel.style.color = "#2E7D32";
        } else {
            timeLeft = Math.max(0, timeLeft - 5);
            document.getElementById('timer').innerText = timeLeft;
            showTimeDeduction();
            expPanel.innerHTML = "<b>Kurang Tepat... 😿</b><br>" + currentQuestion.why;
            expPanel.style.color = "#C62828";
        }
        
        expPanel.style.display = 'block';
        actions.style.display = 'none';
        nextBtn.style.display = 'block';
    }

    function showTimeDeduction() {
        const td = document.getElementById('time-deduction');
        const box = document.getElementById('timer-box').getBoundingClientRect();
        td.style.left = box.left + 'px';
        td.style.top = (box.bottom + 10) + 'px';
        td.style.display = 'block';
        setTimeout(() => td.style.display = 'none', 1000);
    }

    function closeQuiz() {
        document.getElementById('quiz-overlay').style.display = 'none';
        isPaused = false;
        
        // Jika soal habis, langsung selesai
        if (availableQuestions.length === 0) {
            endGame("Hebat! Semua Soal Selesai!");
            return;
        }
        
        setTimeout(spawnFish, 1000);
    }

    function endGame(title) {
        isRunning = false;
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('final-title').innerText = title;
        document.getElementById('final-score').innerText = `Skor Akhir: ${score}`;
        
        if(score >= 80) {
            document.getElementById('final-title').innerText = "🏆 MASTER KIMIA!";
        }
    }

    init();
</script>
</body>
</html>
